workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      vars:
        GRADLE_OPTS: "-Xmx2048m"
      android:
        image: default
    scripts:
      - name: Build APK
        script: |
          ./gradlew clean assembleDebug
    artifacts:
      - build/app/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - your_email@example.com
